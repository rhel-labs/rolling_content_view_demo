<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rolling Content Views - Red Hat Satellite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700;900&family=Red+Hat+Mono:wght@400;500;700&family=Red+Hat+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{overflow:hidden;height:100vh;font-family:'Red Hat Text',sans-serif;color:var(--text);line-height:1.5;background:var(--bg)}
h1,h2,h3,h4{font-family:'Red Hat Display',sans-serif;font-weight:700;line-height:1.2}

:root{
  --red:#EE0000;--red-dark:#FF6060;--red-light:#3D1111;--red-bg:#2A0F0F;
  --white:#1F1F1F;--g10:#151515;--g20:#2A2A2A;--g30:#383838;--g40:#4D4D4D;
  --g50:#8A8A8A;--g60:#B0B0B0;--g70:#D0D0D0;--g80:#E0E0E0;--g95:#F2F2F2;
  --blue:#4DA3FF;--blue-l:#0D2240;--green:#7FBF5F;--green-l:#142A0F;
  --orange:#FF8C5A;--orange-l:#2A1A0F;--teal:#5FCECE;--purple:#9B85E0;
  --yellow:#FFD84D;--yellow-l:#2A2410;
  --bg:#0C0C0C;--text:#E8E8E8;--card-bg:#1A1A1A;--card-border:#2A2A2A;
  --fd:'Red Hat Display',sans-serif;--ft:'Red Hat Text',sans-serif;--fm:'Red Hat Mono',monospace;
}

/* ---- LAYOUT ---- */
.app{display:flex;flex-direction:column;height:100vh}
.topbar{height:6px;background:var(--red);flex-shrink:0}
.main{flex:1;overflow-y:auto;display:flex;justify-content:center;padding:40px 32px 80px;background:var(--bg)}
.slide-wrap{max-width:960px;width:100%;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ---- BOTTOM NAV ---- */
.nav{height:60px;flex-shrink:0;background:var(--card-bg);border-top:1px solid var(--g20);display:flex;align-items:center;padding:0 24px;gap:16px;z-index:100}
.nav__section{font-family:var(--fd);font-size:13px;font-weight:600;color:var(--red);min-width:120px;white-space:nowrap}
.nav__mid{display:flex;align-items:center;gap:12px;flex:1;justify-content:center}
.nav__btn{font-family:var(--ft);font-size:14px;font-weight:500;padding:8px 20px;border-radius:4px;cursor:pointer;border:1px solid var(--g30);background:var(--card-bg);color:var(--g60);transition:all .15s;display:flex;align-items:center;gap:6px}
.nav__btn:hover{border-color:var(--g50);background:var(--g20)}
.nav__btn:disabled{opacity:.35;cursor:default}
.nav__btn--go{background:var(--blue);color:var(--white);border-color:var(--blue)}
.nav__btn--go:hover{background:#004D99}
.nav__step{font-size:12px;color:var(--g50);font-family:var(--ft);min-width:90px;text-align:center}
.nav__bar{width:160px;height:4px;background:var(--g20);border-radius:2px;overflow:hidden}
.nav__fill{height:100%;background:var(--red);transition:width .3s;border-radius:2px}
.nav__tabs{display:flex;gap:4px;margin-left:auto}
.nav__tab{font-family:var(--ft);font-size:11px;padding:4px 10px;border-radius:12px;border:1px solid var(--g30);background:var(--card-bg);color:var(--g50);cursor:pointer;white-space:nowrap;transition:all .15s}
.nav__tab:hover{border-color:var(--g40)}
.nav__tab.on{background:var(--red);color:var(--white);border-color:var(--red)}

/* ---- SLIDE COMPONENTS ---- */
.hero{text-align:center;padding:60px 0 40px}
.hero__badge{display:inline-block;font-family:var(--ft);font-size:12px;font-weight:600;padding:4px 14px;border-radius:12px;background:var(--red);color:var(--white);margin-bottom:16px}
.hero__title{font-family:var(--fd);font-size:2.6rem;font-weight:900;margin-bottom:10px}
.hero__sub{font-size:1.15rem;color:var(--g50);max-width:640px;margin:0 auto}

.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:8px;padding:24px;margin-bottom:16px}
.card--red{border-left:4px solid var(--red)}
.card--blue{border-left:4px solid var(--blue)}
.card--green{border-left:4px solid var(--green)}
.card--teal{border-left:4px solid var(--teal)}
.card__t{font-family:var(--fd);font-size:1.1rem;font-weight:600;margin-bottom:8px}
.card__b{font-size:14px;color:var(--g60);line-height:1.6}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}

.tag{display:inline-flex;align-items:center;gap:4px;font-family:var(--ft);font-size:12px;font-weight:500;padding:3px 10px;border-radius:12px}
.tag--red{background:var(--red-light);color:var(--red-dark)}
.tag--blue{background:var(--blue-l);color:var(--blue)}
.tag--green{background:var(--green-l);color:var(--green)}
.tag--orange{background:var(--orange-l);color:var(--orange)}
.tag--teal{background:var(--teal);color:var(--white)}

.callout{background:var(--red-bg);border:1px solid var(--red-light);border-left:4px solid var(--red);border-radius:6px;padding:16px 20px;margin:20px 0;display:flex;align-items:flex-start;gap:12px;font-size:14px;color:var(--g60);line-height:1.6}
.callout strong{color:var(--red-dark)}
.callout--blue{background:var(--blue-l);border-color:#B8D4F0;border-left-color:var(--blue)}
.callout--blue strong{color:var(--blue)}
.callout--green{background:var(--green-l);border-color:#B8DEBB;border-left-color:var(--green)}
.callout--green strong{color:var(--green)}

.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{text-align:left;padding:12px 16px;font-family:var(--ft);font-weight:600;color:var(--g80);border-bottom:2px solid var(--g30);font-size:13px}
.tbl td{padding:12px 16px;border-bottom:1px solid var(--g20);color:var(--g60)}
.tbl .good{color:var(--green);font-weight:600}
.tbl .warn{color:var(--orange);font-weight:600}

/* ---- DIAGRAMS (SVG containers) ---- */
.diagram{margin:28px 0;text-align:center;overflow-x:auto}
.diagram svg{max-width:100%;height:auto}

/* ---- SCREENSHOTS ---- */
.screenshot{margin:24px 0;text-align:center}
.screenshot img{max-width:100%;border-radius:8px;border:1px solid var(--g30);box-shadow:0 4px 24px rgba(0,0,0,.4)}
.screenshot__cap{font-family:var(--ft);font-size:12px;color:var(--g50);margin-top:8px;font-style:italic}

/* ---- TIMELINE ---- */
.timeline{margin:24px 0;padding-left:20px;border-left:3px solid var(--g20)}
.tl-item{position:relative;padding:0 0 20px 24px}
.tl-item:last-child{padding-bottom:0}
.tl-dot{position:absolute;left:-32px;top:2px;width:16px;height:16px;border-radius:50%;border:3px solid var(--g30);background:var(--card-bg)}
.tl-dot.on{border-color:var(--blue);background:var(--blue)}
.tl-dot.ok{border-color:var(--green);background:var(--green)}
.tl-dot.wr{border-color:var(--orange);background:var(--orange)}
.tl-day{font-family:var(--fd);font-weight:700;font-size:13px;color:var(--g80);margin-bottom:2px}
.tl-txt{font-size:14px;color:var(--g50)}

/* ---- METRICS ---- */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin:24px 0}
.metric{text-align:center;padding:24px}
.metric__v{font-family:var(--fd);font-size:2rem;font-weight:900;color:var(--red);margin-bottom:4px}
.metric__l{font-size:13px;color:var(--g50)}

/* ---- COMPARISON COLUMNS ---- */
.vs{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin:24px 0}
.vs-col{}
.vs-hdr{font-family:var(--fd);font-weight:700;font-size:1rem;padding:12px 16px;border-radius:8px 8px 0 0;text-align:center}
.vs-hdr--std{background:var(--orange-l);color:var(--orange)}
.vs-hdr--roll{background:var(--green-l);color:var(--green)}
.vs-body{background:var(--card-bg);border:1px solid var(--card-border);border-top:none;border-radius:0 0 8px 8px;padding:20px}

/* ---- NUMBERED LIST ---- */
.nlist{counter-reset:ns;margin:16px 0}
.nlist__i{counter-increment:ns;display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--g20)}
.nlist__i::before{content:counter(ns);font-family:var(--fd);font-weight:700;font-size:13px;width:28px;height:28px;border-radius:50%;background:var(--g20);color:var(--g60);display:flex;align-items:center;justify-content:center;flex-shrink:0}

.hint{margin-top:32px;font-size:13px;color:var(--g40);text-align:center}

@media(max-width:800px){
  .grid2,.vs{grid-template-columns:1fr}
  .main{padding:24px 16px 80px}
  .hero__title{font-size:1.8rem}
  .nav__tabs{display:none}
  .nav__section{display:none}
}
</style>
</head>
<body>
<div class="app">
<div class="topbar"></div>
<div class="main" id="main">
  <div class="slide-wrap" id="slide"></div>
</div>
<div class="nav">
  <div class="nav__section" id="nav-sec"></div>
  <div class="nav__mid">
    <button class="nav__btn" id="prev">&#8592; Previous</button>
    <div class="nav__step" id="step-txt"></div>
    <div class="nav__bar"><div class="nav__fill" id="bar"></div></div>
    <button class="nav__btn nav__btn--go" id="next">Next &#8594;</button>
  </div>
  <div class="nav__tabs" id="tabs"></div>
</div>
</div>
<script>
const SEC=[
  {id:'intro',label:'Introduction',s:0},
  {id:'standard',label:'Standard CV',s:3},
  {id:'rolling',label:'Rolling CV',s:8},
  {id:'compare',label:'Comparison',s:12},
  {id:'summary',label:'Summary',s:15},
];

/* ============================================================
   SVG DIAGRAM HELPERS
   ============================================================ */
function svgBox(x,y,w,h,label,sub,fill='#1A1A1A',stroke='#2A2A2A',textColor='#E8E8E8'){
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8" fill="${fill}" stroke="${stroke}" stroke-width="2"/>
  <text x="${x+w/2}" y="${y+h/2-(sub?6:0)}" text-anchor="middle" font-family="Red Hat Display,sans-serif" font-weight="700" font-size="13" fill="${textColor}">${label}</text>
  ${sub?`<text x="${x+w/2}" y="${y+h/2+14}" text-anchor="middle" font-family="Red Hat Text,sans-serif" font-size="11" fill="${textColor}" opacity=".6">${sub}</text>`:''}`;
}
function svgArrow(x1,y1,x2,y2,color='#4D4D4D',dashed=false){
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  const ux=dx/len,uy=dy/len;
  const ax=x2-ux*8,ay=y2-uy*8;
  return `<line x1="${x1}" y1="${y1}" x2="${ax}" y2="${ay}" stroke="${color}" stroke-width="2" ${dashed?'stroke-dasharray="6 4"':''}/>
  <polygon points="${x2},${y2} ${ax-uy*5},${ay+ux*5} ${ax+uy*5},${ay-ux*5}" fill="${color}"/>`;
}
function svgLabel(x,y,text,color='#8A8A8A',size=11){
  return `<text x="${x}" y="${y}" text-anchor="middle" font-family="Red Hat Text,sans-serif" font-size="${size}" fill="${color}">${text}</text>`;
}

/* ============================================================
   STEP DEFINITIONS
   ============================================================ */
const STEPS=[
// ===== INTRO =====
{ sec:'intro', render(){return `
  <div class="hero">
    <div class="hero__badge">Red Hat Satellite</div>
    <h1 class="hero__title">Rolling Content Views</h1>
    <p class="hero__sub">A faster path from sync to server for development and test environments</p>
  </div>
  <div class="grid3">
    <div class="card" style="text-align:center;cursor:pointer" onclick="D.go(3)">
      <div style="font-size:36px;margin-bottom:12px">&#128203;</div>
      <div class="card__t">Standard CV first</div>
      <div class="card__b">Learn the baseline workflow</div>
    </div>
    <div class="card" style="text-align:center;cursor:pointer" onclick="D.go(8)">
      <div style="font-size:36px;margin-bottom:12px">&#9889;</div>
      <div class="card__t">Jump to Rolling CVs</div>
      <div class="card__b">Already know standard CVs?</div>
    </div>
    <div class="card" style="text-align:center;cursor:pointer;border-color:var(--blue)" onclick="D.next()">
      <div style="font-size:36px;margin-bottom:12px">&#128640;</div>
      <div class="card__t">Full guided tour</div>
      <div class="card__b">Recommended</div>
    </div>
  </div>
  <div class="hint">Use arrow keys or click Next to navigate. Press 1-5 to jump to sections.</div>
`;} },

{ sec:'intro', render(){return `
  <h2 style="margin-bottom:8px">Content management at scale</h2>
  <p style="color:var(--g50);margin-bottom:24px">Red Hat Satellite manages RHEL content across your fleet. But the traditional workflow introduces significant overhead for non-production environments.</p>
  <div class="grid3">
    <div class="card" style="text-align:center">
      <div style="font-size:36px;margin-bottom:12px">&#128221;</div>
      <div class="card__t">Manual publishing</div>
      <div class="card__b">Every content update requires an admin to publish a new Content View version.</div>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:36px;margin-bottom:12px">&#128260;</div>
      <div class="card__t">Promotion pipeline</div>
      <div class="card__b">Each version must be promoted through Library, Dev, QA, and Production one at a time.</div>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:36px;margin-bottom:12px">&#9200;</div>
      <div class="card__t">Time lag</div>
      <div class="card__b">Security patches can take 2-4 weeks to reach even dev servers through the standard workflow.</div>
    </div>
  </div>
  <div class="callout"><span style="font-size:18px;flex-shrink:0">&#128200;</span><div><strong>Business impact:</strong> Organizations managing 500+ hosts report spending 4-8 hours per week on content view management. For dev and test environments that simply need the latest content, this overhead delivers no value.</div></div>
`;} },

{ sec:'intro', render(){return `
  <h2 style="margin-bottom:16px">What is a Content View?</h2>
  <p style="color:var(--g50);margin-bottom:8px">A Content View is a curated, filterable collection of repository content. It controls which packages, errata, and modules are available to your hosts.</p>
  <div class="diagram">
    <svg viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">
      ${svgBox(20,20,180,60,'RHEL 10 BaseOS','4,015 packages','#0D2240','#4DA3FF','#E8E8E8')}
      ${svgBox(20,100,180,60,'RHEL 10 AppStream','9,162 packages','#0D2240','#4DA3FF','#E8E8E8')}
      ${svgBox(20,180,180,60,'Satellite Client 6','10 packages','#0D2240','#4DA3FF','#E8E8E8')}
      ${svgArrow(200,50,310,130,'#4DA3FF')}
      ${svgArrow(200,130,310,130,'#4DA3FF')}
      ${svgArrow(200,210,310,130,'#4DA3FF')}
      ${svgLabel(260,115,'Select','#4DA3FF')}
      ${svgBox(310,80,220,100,'Content View','Curated snapshot','#0D2240','#4DA3FF','#4DA3FF')}
      ${svgArrow(530,130,600,130,'#C7C7C7')}
      ${svgLabel(565,120,'Publish','#5A5A5A')}
      ${svgBox(600,80,180,100,'Version 1.0','Immutable snapshot','#2A2A2A','#383838','#B0B0B0')}
      ${svgLabel(400,260,'Repositories are assembled into a Content View, then published as a frozen version.','#707070',12)}
    </svg>
  </div>
  <div class="screenshot">
    <img src="screenshots/content-views-list.png" alt="Content Views list in Red Hat Satellite showing RHEL10-Rolling-CV and RHEL10-Standard-CV">
    <div class="screenshot__cap">Content Views list in Red Hat Satellite 6.19 — showing both a standard and rolling content view</div>
  </div>
  <div class="callout--blue callout"><span style="font-size:18px;flex-shrink:0">&#128161;</span><div><strong>The question is: how does this versioned content reach your hosts?</strong> That is where the standard workflow and rolling content views diverge.</div></div>
`;} },

// ===== STANDARD CV =====
{ sec:'standard', render(){return `
  <h2 style="margin-bottom:8px">Standard Content View: the publish and promote cycle</h2>
  <p style="color:var(--g50);margin-bottom:16px">With a standard Content View, every content update follows a multi-step process: create, publish a version, then manually promote it through each lifecycle environment.</p>
  <div class="diagram">
    <svg viewBox="0 0 820 200" xmlns="http://www.w3.org/2000/svg">
      <text x="410" y="18" text-anchor="middle" font-family="Red Hat Display,sans-serif" font-weight="700" font-size="14" fill="#E8E8E8">Step 1: Create and publish</text>
      ${svgBox(20,35,180,60,'Repositories','RHEL 10 BaseOS, AppStream','#0D2240','#4DA3FF','#E8E8E8')}
      ${svgArrow(200,65,260,65,'#4DA3FF')}
      ${svgLabel(230,55,'Add','#4DA3FF')}
      ${svgBox(260,35,200,60,'Content View','RHEL10-Standard-CV','#0D2240','#4DA3FF','#4DA3FF')}
      ${svgArrow(460,65,520,65,'#5A5A5A')}
      ${svgLabel(490,55,'Publish','#5A5A5A')}
      ${svgBox(520,35,120,60,'Version 1.0','Snapshot','#2A2A2A','#8A8A8A','#B0B0B0')}
      ${svgArrow(640,65,680,65,'#7FBF5F')}
      ${svgBox(680,35,120,60,'Library','v1.0','#142A0F','#7FBF5F','#7FBF5F')}
      <text x="410" y="135" text-anchor="middle" font-family="Red Hat Display,sans-serif" font-weight="700" font-size="13" fill="#8A8A8A">Publishing creates an immutable snapshot and places it in Library.</text>
      <text x="410" y="155" text-anchor="middle" font-family="Red Hat Text,sans-serif" font-size="12" fill="#5A5A5A">No hosts can use this content until it is promoted to their environment.</text>
      <rect x="20" y="170" width="780" height="3" rx="1" fill="#2A2A2A"/>
      <text x="410" y="192" text-anchor="middle" font-family="Red Hat Mono,monospace" font-size="11" fill="#5A5A5A">Admin action required &#9888;</text>
    </svg>
  </div>
  <div class="callout"><span style="font-size:18px;flex-shrink:0">&#128221;</span><div><strong>Publishing is a manual step.</strong> An administrator must explicitly trigger it each time repository content changes. Until published, new packages and errata remain unavailable to any Content View consumers.</div></div>
`;} },

{ sec:'standard', render(){return `
  <h2 style="margin-bottom:8px">Standard Content View: promotion through lifecycle environments</h2>
  <p style="color:var(--g50);margin-bottom:16px">After publishing, Version 1.0 exists only in Library. It must be manually promoted to each successive environment.</p>
  <div class="diagram">
    <svg viewBox="0 0 820 320" xmlns="http://www.w3.org/2000/svg">
      ${svgBox(20,30,150,70,'Library','v1.0 &#10004;','#142A0F','#7FBF5F','#7FBF5F')}
      ${svgArrow(170,65,230,65,'#4DA3FF')}
      <text x="200" y="50" text-anchor="middle" font-family="Red Hat Text,sans-serif" font-size="10" fill="#4DA3FF">Promote</text>
      ${svgBox(230,30,150,70,'Development','v1.0','#0D2240','#4DA3FF','#4DA3FF')}
      ${svgArrow(380,65,440,65,'#4DA3FF')}
      <text x="410" y="50" text-anchor="middle" font-family="Red Hat Text,sans-serif" font-size="10" fill="#4DA3FF">Promote</text>
      ${svgBox(440,30,150,70,'Testing','v1.0','#0D2240','#4DA3FF','#4DA3FF')}
      ${svgArrow(590,65,650,65,'#4DA3FF')}
      <text x="620" y="50" text-anchor="middle" font-family="Red Hat Text,sans-serif" font-size="10" fill="#4DA3FF">Promote</text>
      ${svgBox(650,30,150,70,'Production','v1.0','#0D2240','#4DA3FF','#4DA3FF')}

      <line x1="20" y1="130" x2="800" y2="130" stroke="#2A2A2A" stroke-width="1"/>
      <text x="410" y="152" text-anchor="middle" font-family="Red Hat Display,sans-serif" font-weight="700" font-size="13" fill="#E8E8E8">Timeline for a single publish-and-promote cycle</text>

      <line x1="60" y1="175" x2="60" y2="290" stroke="#2A2A2A" stroke-width="2"/>
      <circle cx="60" cy="185" r="7" fill="#7FBF5F"/>
      <text x="80" y="189" font-family="Red Hat Display,sans-serif" font-weight="700" font-size="12" fill="#B0B0B0">Day 0</text>
      <text x="160" y="189" font-family="Red Hat Text,sans-serif" font-size="12" fill="#8A8A8A">Published to Library</text>

      <circle cx="60" cy="215" r="7" fill="#4DA3FF"/>
      <text x="80" y="219" font-family="Red Hat Display,sans-serif" font-weight="700" font-size="12" fill="#B0B0B0">Day 1</text>
      <text x="160" y="219" font-family="Red Hat Text,sans-serif" font-size="12" fill="#8A8A8A">Admin promotes to Development (manual)</text>

      <circle cx="60" cy="245" r="7" fill="#4DA3FF"/>
      <text x="80" y="249" font-family="Red Hat Display,sans-serif" font-weight="700" font-size="12" fill="#B0B0B0">Day 5</text>
      <text x="160" y="249" font-family="Red Hat Text,sans-serif" font-size="12" fill="#8A8A8A">Validated, promoted to Testing (manual)</text>

      <circle cx="60" cy="275" r="7" fill="#4DA3FF"/>
      <text x="80" y="279" font-family="Red Hat Display,sans-serif" font-weight="700" font-size="12" fill="#B0B0B0">Day 14</text>
      <text x="160" y="279" font-family="Red Hat Text,sans-serif" font-size="12" fill="#8A8A8A">Validated, promoted to Production (manual)</text>

      <!-- spacer -->
    </svg>
  </div>

/* ============================================================
   CONTROLLER
   ============================================================ */
const D={
  s:0,
  init(){
    document.getElementById('tabs').innerHTML=SEC.map(s=>
      `<button class="nav__tab" data-id="${s.id}" onclick="D.go(${s.s})">${s.label}</button>`
    ).join('');
    document.getElementById('next').onclick=()=>this.next();
    document.getElementById('prev').onclick=()=>this.prev();
    document.addEventListener('keydown',e=>{
      if(e.target.tagName==='INPUT')return;
      if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();this.next()}
      if(e.key==='ArrowLeft'){e.preventDefault();this.prev()}
      if(e.key==='Home'){e.preventDefault();this.go(0)}
      if(e.key==='End'){e.preventDefault();this.go(STEPS.length-1)}
      if(e.key>='1'&&e.key<='5'){const i=+e.key-1;if(SEC[i])this.go(SEC[i].s)}
    });
    window.addEventListener('hashchange',()=>{const m=location.hash.match(/^#step-(\d+)$/);if(m)this.go(+m[1])});
    const h=location.hash.match(/^#step-(\d+)$/);
    this.go(h?Math.min(+h[1],STEPS.length-1):0);
  },
  go(i){
    if(i<0||i>=STEPS.length)return;
    this.s=i;
    const step=STEPS[i];
    document.getElementById('slide').innerHTML=`<div class="slide-wrap" style="animation:fadeUp .35s ease">${step.render()}</div>`;
    document.getElementById('prev').disabled=i===0;
    document.getElementById('next').disabled=i===STEPS.length-1;
    document.getElementById('step-txt').textContent=`${i+1} / ${STEPS.length}`;
    document.getElementById('bar').style.width=`${(i+1)/STEPS.length*100}%`;
    const sec=SEC.find(s=>s.id===step.sec);
    document.getElementById('nav-sec').textContent=sec?sec.label:'';
    document.querySelectorAll('.nav__tab').forEach(t=>t.classList.toggle('on',t.dataset.id===step.sec));
    history.replaceState(null,'',`#step-${i}`);
    document.getElementById('main').scrollTop=0;
  },
  next(){this.go(this.s+1)},
  prev(){this.go(this.s-1)},
};
document.addEventListener('DOMContentLoaded',()=>D.init());
</script>
